AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cloud Resume Challenge – Visitor Counter Backend

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
  Api:
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:

  # ── DynamoDB Table ──────────────────────────────────────────────────────────
  VisitorCounterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: VisitorCounter
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ── Lambda Function ─────────────────────────────────────────────────────────
  VisitorCounterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: VisitorCounterFunction
      Handler: lambda_function.lambda_handler
      CodeUri: ./
      Environment:
        Variables:
          TABLE_NAME: !Ref VisitorCounterTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitorCounterTable
      Events:
        CounterPost:
          Type: Api
          Properties:
            Path: /count
            Method: post
        CounterOptions:
          Type: Api
          Properties:
            Path: /count
            Method: options

# ── Outputs ─────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/count"
